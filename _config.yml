title:            Sean Seah
description:      Hi There
logo:             logo.png
disqus_shortname:
# Assign a default image for your site's header and footer
default_bg:       seanseah_bg.jpg
search:           true
share:            true
# Read Time is a calculator tp provide post read-time based on word count. Usage is recommended.
readtime:         true
# Specify the average Words per minute. If not defined, 180 will be used
wpm:				      200
# Turn on or off the fin animations in the header and footer
triangleheader:     false
animated_fins:      false
# Specify the fin color in RGB value
fin_color:        "255,255,255"
# Change url to your domain. Leave localhost server or blank when working locally.
# or use the hint from http://jekyllrb.com/docs/github-pages/ to keep this the same
# whether working locally or remotely. Start Jekyll with: jekyll serve --baseurl ''
#url: http://seanseah.github.io
url: https://seanseah.github.io
baseurl: /seanseah-legacy

# Server
host: 0.0.0.0
port: 8080

# Owner/author information
owner:
  name:           Sean Seah
  avatar:         seanseah.jpg
  email:          sean@gadgetreactor.com
  # Use the coder's toolbox at http://coderstoolbox.net/string/#!encoding=xml&action=encode&charset=us_ascii to encode your description into XML string
  description:    Sean is a writer, engineer, startup evangelist, and a project manager based in Singapore. His interests are anything technology-related, good roasted coffee, and wines.
  # Social networking links used in footer. Update and remove as you like.
  twitter:        gadgetreactor
  facebook:       gadgetreactor
  github:         seanseah
  stackexchange:
  linkedin:
  instagram:      sean__seah
  flickr:
  tumblr:

# Analytics and webmaster tools stuff goes here
# Google Analytics 4 Measurement ID (format: G-XXXXXXXXXX).
# TODO: replace the placeholder below with your real GA4 ID to start collecting.
google_analytics: G-XXXXXXXXXX
google_verify:
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Links to include in footer navigation
# For external links add external: true
links:
  - title: <i class="icon-home"></i> Home
    url: /
    external: false
    icon: home
  - title: <i class="icon-book"></i> My Toys
    url: /gadgets
  - title: <i class="icon-gear"></i> Categories
    url: /categories
  - title: <i class="icon-tags"></i> Tags
    url: /tags
  - title: <i class="icon-pencil"></i> About Me
    url: /about-sean

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    Asia/Singapore
future:      true
highlighter: rouge
markdown:    kramdown
paginate:    6
paginate_path: "page:num"

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title

plugins: [jekyll-paginate]

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

  coderay:
    coderay_line_numbers:
    coderay_line_numbers_start: 1
    coderay_tab_width: 4
    coderay_bold_every: 10
    coderay_css: class

include: [".htaccess"]
exclude: ["lib", "config.rb", "Gemfile", "Capfile", "Gemfile.lock", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "documentation.md"]
