title: "Sean Seah"
description: "Hi There"
url: "https://seanseah.github.io"
baseurl: ""

# Theme (modern, mobile-first)
remote_theme: mmistakes/minimal-mistakes

# Plugins supported by GitHub Pages
plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

# Theme settings
minimal_mistakes_skin: "default" # options: default, dark, air, neon, etc.
locale: "en-SG"

# Site settings
timezone: Asia/Singapore
paginate: 5
paginate_path: /page:num/

# Permalinks
permalink: /:categories/:title/

# Markdown
markdown: kramdown

# Author profile (used by theme)
author:
  name: "Sean Seah"
  avatar: "/assets/images/seanseah.jpg" # move your image here later
  bio: "Writer, engineer, startup evangelist, and project manager based in Singapore."
  location: "Singapore"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/seanseah"
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://instagram.com/sean__seah"
    - label: "Twitter"
      icon: "fab fa-twitter"
      url: "https://twitter.com/gadgetreactor"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/seanseah"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false

# SEO / Analytics
google_analytics: "G-XXXXXXXXXX" # replace with GA4 if you want

# Build settings
include:
  - .htaccess

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
